site:
  base_url: "https://members.foodcoop.com"
  shift_path_template: "/services/shifts/{week_offset}/{committee_id}/{time_of_day}/{date}/"
  max_weeks: 6
  quiet_hours:
    start: 0
    end: 24
    timezone: "America/New_York"

# Available shift types (from real site):
#   Lifting, Dairy Lifting, Bulk Lifting, Meat Processing & Lifting,
#   Stocking, Producer, Flex, Office, Cleaning, Bathroom, Bins,
#   Case Maintenance, Food Processing, Soup: Food Services,
#   Soup: Guest Services- Outdoor, Produce Processing

# SMTP credentials use $ENV_VAR syntax to reference GitHub Actions secrets.
# Each user has their own smtp block so different people can use different
# Gmail accounts (or any SMTP provider).

users:
  - name: "Mike"
    credentials:
      username: "$COOP_USERNAME_MIKE"
      password: "$COOP_PASSWORD_MIKE"
    shift_types:
      - "Cart Return"
    availability:
      - day: "Saturday"
        after: "17:00"
      - day: "Sunday"
        before: "10:00"
      - day: "Sunday"
        after: "17:00"
      - day: "Monday"
        after: "17:00"
      - day: "Tuesday"
        after: "18:00"
      - day: "Wednesday"
        after: "18:00"
      - day: "Thursday"
        after: "18:00"
      - day: "Friday"
        after: "17:00"
    notify:
      sms: "$MIKE_SMS_NUMBER"
      carrier: "t-mobile"
      smtp:
        host: "smtp.gmail.com"
        port: 587
        username: "$MIKE_SMTP_USER"
        password: "$MIKE_SMTP_PASS"

  - name: "Nancy"
    credentials:
      username: "$COOP_USERNAME_NANCY"
      password: "$COOP_PASSWORD_NANCY"
    shift_types:
      - "Checkout"
    availability:
      - day: "Monday"
      - day: "Sunday"
    notify:
      sms: "$NANCY_SMS_NUMBER"
      carrier: "t-mobile"
      smtp:
        host: "smtp.gmail.com"
        port: 587
        username: "$MIKE_SMTP_USER"
        password: "$MIKE_SMTP_PASS"
