<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSFC Shift Monitor Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; padding: 20px; }
  h1 { text-align: center; margin-bottom: 8px; color: #1a1a2e; }
  .subtitle { text-align: center; color: #666; margin-bottom: 24px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card h2 { font-size: 16px; color: #555; margin-bottom: 12px; }
  .stat-row { display: flex; gap: 20px; margin-bottom: 20px; max-width: 1200px; margin: 0 auto 20px; }
  .stat-box { flex: 1; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
  .stat-box .number { font-size: 36px; font-weight: 700; color: #2d6a4f; }
  .stat-box .label { font-size: 13px; color: #888; margin-top: 4px; }
  .full-width { grid-column: 1 / -1; }
  canvas { max-height: 300px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #eee; }
  th { color: #888; font-weight: 600; font-size: 12px; text-transform: uppercase; }
  .empty { text-align: center; color: #999; padding: 40px; }
  .heatmap-grid { display: grid; grid-template-columns: auto repeat(24, 1fr); gap: 2px; font-size: 11px; }
  .heatmap-grid .day-label { text-align: right; padding-right: 6px; line-height: 22px; color: #666; }
  .heatmap-grid .hour-label { text-align: center; color: #999; font-size: 10px; }
  .heatmap-cell { width: 100%; aspect-ratio: 1; border-radius: 3px; min-height: 18px; }
</style>
</head>
<body>
<h1>PSFC Shift Monitor</h1>
<p class="subtitle">Auto-updated by GitHub Actions</p>

<div class="stat-row" id="summary-stats">
  <div class="stat-box"><div class="number" id="total-runs">-</div><div class="label">Total Runs</div></div>
  <div class="stat-box"><div class="number" id="total-notified">-</div><div class="label">Notifications Sent</div></div>
  <div class="stat-box"><div class="number" id="last-run">-</div><div class="label">Last Run</div></div>
</div>

<div class="grid">
  <div class="card">
    <h2>Notifications per User</h2>
    <canvas id="userChart"></canvas>
  </div>
  <div class="card">
    <h2>Matches vs Notifications Over Time</h2>
    <canvas id="timeChart"></canvas>
  </div>
  <div class="card full-width">
    <h2>Shift Activity Heatmap (day/hour of run)</h2>
    <div id="heatmap"></div>
  </div>
  <div class="card full-width">
    <h2>Recent Run History</h2>
    <div id="history-table"></div>
  </div>
</div>

<script>
const COLORS = ['#2d6a4f','#40916c','#52b788','#74c69d','#95d5b2','#b7e4c7'];

async function loadStats() {
  try {
    const resp = await fetch('stats.json');
    if (!resp.ok) throw new Error('No stats.json found');
    return await resp.json();
  } catch {
    return [];
  }
}

function formatTs(iso) {
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function renderSummary(stats) {
  document.getElementById('total-runs').textContent = stats.length;
  let totalNotified = 0;
  for (const r of stats) {
    for (const u of Object.values(r.users || {})) {
      totalNotified += u.notified || 0;
    }
  }
  document.getElementById('total-notified').textContent = totalNotified;
  if (stats.length > 0) {
    document.getElementById('last-run').textContent = formatTs(stats[stats.length-1].ts);
  }
}

function renderUserChart(stats) {
  const totals = {};
  for (const r of stats) {
    for (const [user, c] of Object.entries(r.users || {})) {
      if (!totals[user]) totals[user] = { matched: 0, notified: 0 };
      totals[user].matched += c.matched || 0;
      totals[user].notified += c.notified || 0;
    }
  }
  const users = Object.keys(totals).sort();
  new Chart(document.getElementById('userChart'), {
    type: 'bar',
    data: {
      labels: users,
      datasets: [
        { label: 'Matched', data: users.map(u => totals[u].matched), backgroundColor: '#74c69d' },
        { label: 'Notified', data: users.map(u => totals[u].notified), backgroundColor: '#2d6a4f' },
      ]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
  });
}

function renderTimeChart(stats) {
  const last30 = stats.slice(-30);
  const labels = last30.map(r => formatTs(r.ts));
  const matchData = last30.map(r => {
    let m = 0;
    for (const u of Object.values(r.users || {})) m += u.matched || 0;
    return m;
  });
  const notifyData = last30.map(r => {
    let n = 0;
    for (const u of Object.values(r.users || {})) n += u.notified || 0;
    return n;
  });
  new Chart(document.getElementById('timeChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Matched', data: matchData, borderColor: '#74c69d', backgroundColor: 'rgba(116,198,157,0.1)', fill: true, tension: 0.3 },
        { label: 'Notified', data: notifyData, borderColor: '#2d6a4f', backgroundColor: 'rgba(45,106,79,0.1)', fill: true, tension: 0.3 },
      ]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } }, scales: { x: { display: false } } }
  });
}

function renderHeatmap(stats) {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const grid = Array.from({ length: 7 }, () => Array(24).fill(0));
  for (const r of stats) {
    const d = new Date(r.ts);
    let totalNotified = 0;
    for (const u of Object.values(r.users || {})) totalNotified += u.notified || 0;
    if (totalNotified > 0) grid[d.getUTCDay()][d.getUTCHours()] += totalNotified;
  }
  const maxVal = Math.max(1, ...grid.flat());
  const container = document.getElementById('heatmap');
  let html = '<div class="heatmap-grid">';
  // Hour labels row
  html += '<div></div>';
  for (let h = 0; h < 24; h++) html += `<div class="hour-label">${h}</div>`;
  for (let d = 0; d < 7; d++) {
    html += `<div class="day-label">${days[d]}</div>`;
    for (let h = 0; h < 24; h++) {
      const intensity = grid[d][h] / maxVal;
      const bg = intensity === 0 ? '#f0f0f0' : `rgba(45,106,79,${0.15 + intensity * 0.85})`;
      html += `<div class="heatmap-cell" style="background:${bg}" title="${days[d]} ${h}:00 - ${grid[d][h]} notifications"></div>`;
    }
  }
  html += '</div>';
  container.innerHTML = html;
}

function renderHistory(stats) {
  const recent = stats.slice(-20).reverse();
  if (recent.length === 0) {
    document.getElementById('history-table').innerHTML = '<div class="empty">No runs recorded yet.</div>';
    return;
  }
  let html = '<table><thead><tr><th>Time</th><th>Total Shifts</th>';
  const allUsers = new Set();
  for (const r of recent) for (const u of Object.keys(r.users || {})) allUsers.add(u);
  const users = [...allUsers].sort();
  for (const u of users) html += `<th>${u}</th>`;
  html += '</tr></thead><tbody>';
  for (const r of recent) {
    html += `<tr><td>${formatTs(r.ts)}</td><td>${r.total}</td>`;
    for (const u of users) {
      const c = (r.users || {})[u];
      html += `<td>${c ? `${c.matched}m / ${c.notified}n` : '-'}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('history-table').innerHTML = html;
}

loadStats().then(stats => {
  if (stats.length === 0) {
    document.querySelector('.grid').innerHTML = '<div class="card full-width"><div class="empty">No stats data yet. Run the shift monitor to start collecting data.</div></div>';
    return;
  }
  renderSummary(stats);
  renderUserChart(stats);
  renderTimeChart(stats);
  renderHeatmap(stats);
  renderHistory(stats);
});
</script>
</body>
</html>
