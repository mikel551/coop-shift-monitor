<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSFC Shift Monitor Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='none' stroke='%2310b981' stroke-width='3'/%3E%3Cpath d='M20 20h2l3 18h16l3-14H26' fill='none' stroke='%2310b981' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='28' cy='44' r='2.5' fill='%2310b981'/%3E%3Ccircle cx='40' cy='44' r='2.5' fill='%2310b981'/%3E%3Ccircle cx='44' cy='18' r='10' fill='%230f172a' stroke='%2310b981' stroke-width='2.5'/%3E%3Cline x1='44' y1='12' x2='44' y2='18' stroke='%2310b981' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='44' y1='18' x2='48' y2='21' stroke='%2310b981' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
  .header-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; }
  .header-icon { width: 32px; height: 32px; flex-shrink: 0; }
  h1 { text-align: center; color: #f1f5f9; }
  .subtitle { text-align: center; color: #64748b; margin-bottom: 24px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
  .card {
    background: #1e293b; border-radius: 12px; padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    opacity: 0; transform: translateY(16px);
    animation: fadeSlideUp 0.4s ease-out forwards;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.45); }
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.3s; }
  .card h2 { font-size: 16px; color: #94a3b8; margin-bottom: 12px; }
  .stat-row { display: flex; gap: 20px; margin-bottom: 20px; max-width: 1200px; margin: 0 auto 20px; }
  .stat-box {
    flex: 1; background: #1e293b; border-radius: 12px; padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3); text-align: center;
    opacity: 0; transform: translateY(16px);
    animation: fadeSlideUp 0.4s ease-out forwards;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .stat-box:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.45); }
  .stat-box:nth-child(1) { animation-delay: 0s; }
  .stat-box:nth-child(2) { animation-delay: 0.05s; }
  .stat-box:nth-child(3) { animation-delay: 0.1s; }
  .stat-box .number { font-size: 36px; font-weight: 700; color: #10b981; }
  .stat-box .label { font-size: 13px; color: #64748b; margin-top: 4px; }
  .full-width { grid-column: 1 / -1; }
  canvas { max-height: 300px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.06); }
  th { color: #94a3b8; font-weight: 600; font-size: 12px; text-transform: uppercase; }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .empty { text-align: center; color: #64748b; padding: 40px; }
  .heatmap-grid { display: grid; grid-template-columns: auto repeat(24, 1fr); gap: 2px; font-size: 11px; }
  .heatmap-grid .day-label { text-align: right; padding-right: 6px; line-height: 22px; color: #64748b; }
  .heatmap-grid .hour-label { text-align: center; color: #64748b; font-size: 10px; }
  .heatmap-cell { width: 100%; aspect-ratio: 1; border-radius: 3px; min-height: 18px; }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="header-row">
  <svg class="header-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="32" cy="32" r="30" stroke="#10b981" stroke-width="3"/>
    <path d="M20 20h2l3 18h16l3-14H26" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="28" cy="44" r="2.5" fill="#10b981"/>
    <circle cx="40" cy="44" r="2.5" fill="#10b981"/>
    <circle cx="44" cy="18" r="10" fill="#0f172a" stroke="#10b981" stroke-width="2.5"/>
    <line x1="44" y1="12" x2="44" y2="18" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="18" x2="48" y2="21" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <h1>PSFC Shift Monitor</h1>
</div>
<p class="subtitle">Auto-updated by GitHub Actions</p>

<div class="stat-row" id="summary-stats">
  <div class="stat-box"><div class="number" id="total-runs">-</div><div class="label">Total Runs</div></div>
  <div class="stat-box"><div class="number" id="total-notified">-</div><div class="label">Notifications Sent</div></div>
  <div class="stat-box"><div class="number" id="last-run">-</div><div class="label">Last Run</div></div>
</div>

<div class="grid">
  <div class="card">
    <h2>Notifications per User</h2>
    <canvas id="userChart"></canvas>
  </div>
  <div class="card">
    <h2>Matches vs Notifications Over Time</h2>
    <canvas id="timeChart"></canvas>
  </div>
  <div class="card full-width">
    <h2>Shift Match Heatmap (day/hour of run)</h2>
    <div id="heatmap"></div>
  </div>
  <div class="card full-width" id="comparison-card" style="display:none">
    <h2>Current vs Previous Period</h2>
    <div id="comparison-table"></div>
  </div>
  <div class="card full-width">
    <h2>Recent Matched Shifts (48h)</h2>
    <div id="recent-shifts-table"></div>
  </div>
  <div class="card full-width">
    <h2>Recent Run History</h2>
    <div id="history-table"></div>
  </div>
</div>

<script>
const COLORS = ['#10b981','#34d399','#6ee7b7','#14b8a6','#2dd4bf','#5eead4'];

// Chart.js dark mode defaults
Chart.defaults.color = '#94a3b8';
Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
Chart.defaults.scale.grid = { color: 'rgba(255,255,255,0.06)' };

async function loadStats() {
  try {
    const resp = await fetch('stats.json');
    if (!resp.ok) throw new Error('No stats.json found');
    const data = await resp.json();
    // Support both old (array) and new ({stats, previous_period}) formats
    if (Array.isArray(data)) return { stats: data, previous_period: {} };
    return data;
  } catch {
    return { stats: [], previous_period: {} };
  }
}

function formatTs(iso) {
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function renderSummary(stats) {
  document.getElementById('total-runs').textContent = stats.length;
  let totalNotified = 0;
  for (const r of stats) {
    for (const u of Object.values(r.users || {})) {
      totalNotified += u.notified || 0;
    }
  }
  document.getElementById('total-notified').textContent = totalNotified;
  if (stats.length > 0) {
    document.getElementById('last-run').textContent = formatTs(stats[stats.length-1].ts);
  }
}

function renderUserChart(stats) {
  const totals = {};
  for (const r of stats) {
    for (const [user, c] of Object.entries(r.users || {})) {
      if (!totals[user]) totals[user] = { matched: 0, notified: 0 };
      totals[user].matched += c.matched || 0;
      totals[user].notified += c.notified || 0;
    }
  }
  const users = Object.keys(totals).sort();
  new Chart(document.getElementById('userChart'), {
    type: 'bar',
    data: {
      labels: users,
      datasets: [
        { label: 'Matched', data: users.map(u => totals[u].matched), backgroundColor: '#34d399' },
        { label: 'Notified', data: users.map(u => totals[u].notified), backgroundColor: '#10b981' },
      ]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
  });
}

function renderTimeChart(stats) {
  const last288 = stats.slice(-288);
  const labels = last288.map(r => formatTs(r.ts));
  const matchData = last288.map(r => {
    let m = 0;
    for (const u of Object.values(r.users || {})) m += u.matched || 0;
    return m;
  });
  const notifyData = last288.map(r => {
    let n = 0;
    for (const u of Object.values(r.users || {})) n += u.notified || 0;
    return n;
  });
  const pruneData = last288.map(r => r.pruned || 0);
  new Chart(document.getElementById('timeChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Matched', data: matchData, borderColor: '#34d399', backgroundColor: 'rgba(52,211,153,0.1)', fill: true, tension: 0.3 },
        { label: 'Notified', data: notifyData, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.3 },
        { label: 'Pruned', data: pruneData, borderColor: '#f87171', backgroundColor: 'rgba(248,113,113,0.1)', fill: true, tension: 0.3 },
      ]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } }, scales: { x: { display: false } } }
  });
}

function renderHeatmap(stats) {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const startHour = 0, endHour = 24; // all 24 hours
  const numHours = endHour - startHour;
  const grid = Array.from({ length: 7 }, () => Array(numHours).fill(0));
  for (const r of stats) {
    // Convert UTC to Eastern time
    const d = new Date(r.ts);
    const et = new Date(d.toLocaleString('en-US', { timeZone: 'America/New_York' }));
    let totalMatched = 0;
    for (const u of Object.values(r.users || {})) totalMatched += u.matched || 0;
    const hour = et.getHours();
    if (totalMatched > 0 && hour >= startHour && hour < endHour) {
      grid[et.getDay()][hour - startHour] += totalMatched;
    }
  }
  const maxVal = Math.max(1, ...grid.flat());
  const container = document.getElementById('heatmap');
  let html = '<div class="heatmap-grid">';
  // Hour labels row
  html += '<div></div>';
  for (let h = startHour; h < endHour; h++) {
    const label = h <= 12 ? `${h}${h < 12 ? 'a' : 'p'}` : `${h-12}p`;
    html += `<div class="hour-label">${label}</div>`;
  }
  for (let d = 0; d < 7; d++) {
    html += `<div class="day-label">${days[d]}</div>`;
    for (let h = 0; h < numHours; h++) {
      const intensity = grid[d][h] / maxVal;
      const bg = intensity === 0 ? 'rgba(255,255,255,0.04)' : `rgba(16,185,129,${0.15 + intensity * 0.85})`;
      const displayHour = h + startHour;
      const label = displayHour <= 12 ? `${displayHour}${displayHour < 12 ? 'am' : 'pm'}` : `${displayHour-12}pm`;
      html += `<div class="heatmap-cell" style="background:${bg}" title="${days[d]} ${label} - ${grid[d][h]} matched"></div>`;
    }
  }
  html += '</div>';
  container.innerHTML = html;
}

function renderHistory(stats) {
  const recent = stats.slice(-20).reverse();
  if (recent.length === 0) {
    document.getElementById('history-table').innerHTML = '<div class="empty">No runs recorded yet.</div>';
    return;
  }
  let html = '<table><thead><tr><th>Time</th><th>Total Shifts</th>';
  const allUsers = new Set();
  for (const r of recent) for (const u of Object.keys(r.users || {})) allUsers.add(u);
  const users = [...allUsers].sort();
  for (const u of users) html += `<th>${u}</th>`;
  html += '</tr></thead><tbody>';
  for (const r of recent) {
    html += `<tr><td>${formatTs(r.ts)}</td><td>${r.total}</td>`;
    for (const u of users) {
      const c = (r.users || {})[u];
      html += `<td>${c ? `${c.matched}m / ${c.notified}n` : '-'}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('history-table').innerHTML = html;
}

function renderRecentShifts(stats) {
  const cutoff = Date.now() - 48 * 60 * 60 * 1000;
  const recent = stats.filter(r => new Date(r.ts).getTime() >= cutoff);
  const seen = new Set();
  const shifts = [];
  for (const r of recent) {
    for (const [user, u] of Object.entries(r.users || {})) {
      for (const s of (u.shifts || [])) {
        const key = s.id + '|' + user;
        if (seen.has(key)) continue;
        seen.add(key);
        shifts.push({ ...s, user });
      }
    }
  }
  const container = document.getElementById('recent-shifts-table');
  if (shifts.length === 0) {
    container.innerHTML = '<div class="empty">No matched shifts in the last 48 hours.</div>';
    return;
  }
  shifts.sort((a, b) => a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
  let html = '<table><thead><tr><th>Date</th><th>Time</th><th>Type</th><th>User</th></tr></thead><tbody>';
  for (const s of shifts) {
    const d = new Date(s.date + 'T00:00:00');
    const dateStr = d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    html += `<tr><td>${dateStr}</td><td>${s.start} – ${s.end}</td><td>${s.type}</td><td>${s.user}</td></tr>`;
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

function renderComparison(stats, previousPeriod) {
  if (!previousPeriod || !previousPeriod.total_runs) return;
  document.getElementById('comparison-card').style.display = '';
  // Current period totals
  const current = { total_runs: stats.length, users: {} };
  for (const r of stats) {
    for (const [user, c] of Object.entries(r.users || {})) {
      if (!current.users[user]) current.users[user] = { matched: 0, notified: 0 };
      current.users[user].matched += c.matched || 0;
      current.users[user].notified += c.notified || 0;
    }
  }
  const allUsers = new Set([...Object.keys(current.users), ...Object.keys(previousPeriod.users || {})]);
  const users = [...allUsers].sort();
  let html = '<table><thead><tr><th>User</th><th colspan="2">Current Period</th><th colspan="2">Previous Period</th></tr>';
  html += '<tr><th></th><th>Matched</th><th>Notified</th><th>Matched</th><th>Notified</th></tr></thead><tbody>';
  for (const u of users) {
    const cur = current.users[u] || { matched: 0, notified: 0 };
    const prev = (previousPeriod.users || {})[u] || { matched: 0, notified: 0 };
    html += `<tr><td>${u}</td><td>${cur.matched}</td><td>${cur.notified}</td><td>${prev.matched}</td><td>${prev.notified}</td></tr>`;
  }
  html += `<tr style="font-weight:600;border-top:2px solid rgba(255,255,255,0.1)"><td>Total Runs</td><td colspan="2">${current.total_runs}</td><td colspan="2">${previousPeriod.total_runs}</td></tr>`;
  html += '</tbody></table>';
  document.getElementById('comparison-table').innerHTML = html;
}

loadStats().then(data => {
  const stats = data.stats;
  const previousPeriod = data.previous_period || {};
  if (stats.length === 0) {
    document.querySelector('.grid').innerHTML = '<div class="card full-width"><div class="empty">No stats data yet. Run the shift monitor to start collecting data.</div></div>';
    return;
  }
  renderSummary(stats);
  renderUserChart(stats);
  renderTimeChart(stats);
  renderHeatmap(stats);
  renderRecentShifts(stats);
  renderComparison(stats, previousPeriod);
  renderHistory(stats);
});
</script>
</body>
</html>
